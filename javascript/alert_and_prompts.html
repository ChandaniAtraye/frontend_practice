<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alert & prompts</title>
</head>
<body>
    <script>
        //alerts : alerts displays an alert message on the page
        alert("Something is wrong!");
        console.log("This is a simple log");
        console.error("this is an error msg");
        console.warn("this is a warning msg");
    </script>
    <script>
        //prompts : prompts displays a dialog box that asks user for some input.
    //    let pass =  prompt("please enter the password.");
    //    console.log(pass);
    let fname = prompt("Enter your first name" );
    let lname = prompt("Enter your last name" );
    console.log("FullName :"+fname+ " "+ lname); // we can use comma , instead of + for concat.

    </script>
</body>
</html>
